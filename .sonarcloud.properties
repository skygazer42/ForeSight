sonar.organization=skygazer42
sonar.projectKey=skygazer42_ForeSight

# Automatic Analysis ignores sonar-project.properties, so keep its maintained
# scope here as well and explicitly drop declarative registries, CLI entrypoints,
# and orchestration wrappers that create low-signal maintainability noise.
