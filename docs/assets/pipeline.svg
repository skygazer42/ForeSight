<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="pBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <marker id="pArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#a78bfa"/>
    </marker>
    <filter id="pShadow" x="-2%" y="-6%" width="104%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0002"/>
    </filter>
  </defs>

  <rect width="900" height="160" rx="10" fill="url(#pBg)"/>

  <!-- Step 1: Data -->
  <rect x="20" y="30" width="140" height="100" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" filter="url(#pShadow)"/>
  <text x="90" y="58" text-anchor="middle" fill="#92400e" font-size="22">=Ę</text>
  <text x="90" y="78" text-anchor="middle" fill="#92400e" font-size="13" font-weight="700">Data</text>
  <text x="90" y="94" text-anchor="middle" fill="#a16207" font-size="10">Long format</text>
  <text x="90" y="108" text-anchor="middle" fill="#a16207" font-size="10">unique_id / ds / y</text>

  <!-- Arrow 1 -->
  <line x1="168" y1="80" x2="198" y2="80" stroke="#a78bfa" stroke-width="2" marker-end="url(#pArrow)"/>

  <!-- Step 2: Model -->
  <rect x="206" y="30" width="140" height="100" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#pShadow)"/>
  <text x="276" y="58" text-anchor="middle" fill="#1e40af" font-size="22">>ŕ</text>
  <text x="276" y="78" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="700">Model</text>
  <text x="276" y="94" text-anchor="middle" fill="#2563eb" font-size="10">Statistical / ML / DL</text>
  <text x="276" y="108" text-anchor="middle" fill="#2563eb" font-size="10">250+ unified models</text>

  <!-- Arrow 2 -->
  <line x1="354" y1="80" x2="384" y2="80" stroke="#a78bfa" stroke-width="2" marker-end="url(#pArrow)"/>

  <!-- Step 3: Backtest -->
  <rect x="392" y="30" width="140" height="100" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" filter="url(#pShadow)"/>
  <text x="462" y="58" text-anchor="middle" fill="#065f46" font-size="22">=</text>
  <text x="462" y="78" text-anchor="middle" fill="#065f46" font-size="13" font-weight="700">Backtest</text>
  <text x="462" y="94" text-anchor="middle" fill="#047857" font-size="10">Walk-forward CV</text>
  <text x="462" y="108" text-anchor="middle" fill="#047857" font-size="10">Expanding / Rolling</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="80" x2="570" y2="80" stroke="#a78bfa" stroke-width="2" marker-end="url(#pArrow)"/>

  <!-- Step 4: Evaluate -->
  <rect x="578" y="30" width="140" height="100" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#pShadow)"/>
  <text x="648" y="58" text-anchor="middle" fill="#9d174d" font-size="22">=Č</text>
  <text x="648" y="78" text-anchor="middle" fill="#9d174d" font-size="13" font-weight="700">Evaluate</text>
  <text x="648" y="94" text-anchor="middle" fill="#be185d" font-size="10">MAE / RMSE / CRPS</text>
  <text x="648" y="108" text-anchor="middle" fill="#be185d" font-size="10">20+ metrics</text>

  <!-- Arrow 4 -->
  <line x1="726" y1="80" x2="756" y2="80" stroke="#a78bfa" stroke-width="2" marker-end="url(#pArrow)"/>

  <!-- Step 5: Deploy -->
  <rect x="764" y="30" width="120" height="100" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#pShadow)"/>
  <text x="824" y="58" text-anchor="middle" fill="#5b21b6" font-size="22">=€</text>
  <text x="824" y="78" text-anchor="middle" fill="#5b21b6" font-size="13" font-weight="700">Deploy</text>
  <text x="824" y="94" text-anchor="middle" fill="#6d28d9" font-size="10">Save / Load</text>
  <text x="824" y="108" text-anchor="middle" fill="#6d28d9" font-size="10">Artifact workflow</text>
</svg>
