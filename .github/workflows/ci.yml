name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: No notebooks
        run: python tools/check_no_ipynb.py

      - name: Capability docs sync
        run: python tools/check_capability_docs.py

      - name: Generated docs sync
        run: python tools/generate_model_capability_docs.py --check

      - name: Lint
        run: ruff check src tests tools benchmarks

      - name: Format
        run: |
          ruff format --check \
            benchmarks/run_benchmarks.py \
            src/foresight/__init__.py \
            src/foresight/datasets/__init__.py \
            src/foresight/datasets/registry.py \
            tests/test_packaged_datasets_smoke.py \
            tests/test_release_tooling.py \
            src/foresight/base.py \
            src/foresight/serialization.py \
            tests/test_root_import.py \
            tests/test_models_registry.py \
            tools/check_capability_docs.py \
            tools/generate_model_capability_docs.py \
            tools/release_check.py

      - name: Type check
        run: python -m mypy --no-incremental --cache-dir=/dev/null

      - name: Compile
        run: python -m compileall -q src tools benchmarks

      - name: Docs build
        run: mkdocs build --strict

  sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,torch,stats]

      - name: Tests
        run: |
          pytest -q \
            tests/test_fetch_rnn_paper_metadata.py \
            tests/test_forecasting_internals.py \
            tests/test_models_adida.py \
            tests/test_models_global_regression_validation.py \
            tests/test_models_intermittent.py \
            tests/test_models_intermittent_more.py \
            tests/test_release_tooling.py \
            tests/test_model_validation_messages.py \
            tests/test_models_registry.py \
            tests/test_models_theta.py \
            tests/test_models_theta_auto.py \
            tests/test_no_mergeable_nested_ifs.py \
            tests/test_no_nested_conditionals.py \
            tests/test_no_float_literal_comparisons.py \
            tests/test_root_import.py \
            tests/test_sonar_coverage_recent_fixes.py \
            tests/test_torch_global_validation_messages.py \
            --cov=foresight \
            --cov-report=xml:coverage.xml

      - name: SonarQube Scan
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        with:
          projectBaseDir: .
          args: >
            -Dsonar.exclusions=**/__pycache__/**,src/foresight_ts.egg-info/**,src/foresight/cli_catalog.py,src/foresight/models/runtime.py,**/src/foresight/cli_catalog.py,**/src/foresight/models/runtime.py
            -Dsonar.cpd.exclusions=src/foresight/cli.py,src/foresight/cli_catalog.py,src/foresight/cli_data.py,src/foresight/cli_leaderboard.py,src/foresight/models/runtime.py,src/foresight/models/catalog/**,src/foresight/models/torch_nn.py,**/src/foresight/cli_catalog.py,**/src/foresight/models/runtime.py
            -Dsonar.coverage.exclusions=tools/**,.github/workflows/**,src/foresight/base.py,src/foresight/cli.py,src/foresight/cli_data.py,src/foresight/cli_leaderboard.py,src/foresight/cli_shared.py,src/foresight/contracts/**,src/foresight/cv.py,src/foresight/data/format.py,src/foresight/data/prep.py,src/foresight/eval_forecast.py,src/foresight/forecast.py,src/foresight/models/factories.py,src/foresight/models/torch_nn.py,src/foresight/services/cli_workflows.py,src/foresight/services/evaluation.py,src/foresight/services/forecasting.py,src/foresight/services/model_execution.py
            -Dsonar.issue.ignore.multicriteria=e1,e2
            -Dsonar.issue.ignore.multicriteria.e1.ruleKey=pythonsecurity:S2083
            -Dsonar.issue.ignore.multicriteria.e1.resourceKey=**/src/foresight/cli_shared.py
            -Dsonar.issue.ignore.multicriteria.e2.ruleKey=pythonsecurity:S2083
            -Dsonar.issue.ignore.multicriteria.e2.resourceKey=**/tools/fetch_rnn_paper_metadata.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test-core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Tests
        run: |
          if [ "${{ matrix.python-version }}" = "3.10" ]; then
            pytest -q --cov=foresight --cov-report=term-missing
          else
            pytest -q
          fi

      - name: Benchmark smoke
        if: matrix.python-version == '3.10'
        run: python benchmarks/run_benchmarks.py --smoke

  test-optional:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            extra: "stats"
            tests: "tests/test_models_optional_deps_more.py tests/test_eval_local_xreg.py"
          - python-version: "3.10"
            extra: "ml"
            tests: "tests/test_models_optional_deps_ml.py tests/test_models_global_regression_smoke.py"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,${{ matrix.extra }}]"

      - name: Optional dependency smoke tests
        run: pytest -q ${{ matrix.tests }}

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build (wheel + sdist)
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Twine check (artifacts)
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Install wheel
        run: |
          python -m pip install dist/*.whl
          python -m pip check

      - name: CLI smoke (installed wheel)
        run: |
          foresight --version
          python -m foresight --version
          python -m foresight models info torch-rnnpaper-elman-srn-direct
          python -m foresight datasets preview catfish --nrows 3

      - name: CLI smoke (installed sdist in clean venv)
        run: |
          python -m venv /tmp/foresight_sdist_venv
          /tmp/foresight_sdist_venv/bin/python -m pip install --upgrade pip
          /tmp/foresight_sdist_venv/bin/python -m pip install dist/*.tar.gz
          /tmp/foresight_sdist_venv/bin/python -m pip check
          /tmp/foresight_sdist_venv/bin/foresight --version
          /tmp/foresight_sdist_venv/bin/python -m foresight --version
          /tmp/foresight_sdist_venv/bin/python -m foresight models info torch-rnnpaper-elman-srn-direct
          /tmp/foresight_sdist_venv/bin/python -m foresight datasets preview catfish --nrows 3
