name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: No notebooks
        run: python tools/check_no_ipynb.py

      - name: Lint
        run: ruff check src tests tools

      - name: Format
        run: ruff format --check src tests tools

      - name: Compile
        run: python -m compileall -q src tools

      - name: Tests
        run: pytest -q
